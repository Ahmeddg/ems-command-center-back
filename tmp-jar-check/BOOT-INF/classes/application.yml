spring:
  application:
    name: ems-command-center

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/ems_db}
      database: ems_db

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.example.ems_command_center: DEBUG
    org.springframework.data.mongodb: INFO
